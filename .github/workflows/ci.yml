name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
      - name: Install dependencies (filtered)
        run: |
          python -m pip install --upgrade pip
          grep -v -E 'customer-assets.emergentagent.com|@|emergentintegrations' backend/requirements.txt > backend/requirements.ci.txt || true
          echo "Filtered requirements written to backend/requirements.ci.txt"
          python -m pip install -r backend/requirements.ci.txt
      - name: Run backend tests (skip security integration tests)
        run: |
          # Some tests target external preview endpoints and may fail in CI.
          # Skip the security_fixes integration tests that require specific remote behavior.
          pytest -q backend/tests -k "not security_fixes"

  frontend:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'
      - name: Enable Yarn via Corepack
        run: |
          corepack enable || true
          corepack prepare yarn@1.22.22 --activate || true
          node --version || true
          npm --version || true
          yarn --version || true
      - name: Install frontend deps
        run: |
          cd frontend
          yarn install --frozen-lockfile || yarn install
      - name: Run lint
        run: |
          cd frontend
          yarn lint
